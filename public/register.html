<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Create Account - RandomChat</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <nav class="navbar">
    <div class="brand">RandomChat ✨</div>
    <div class="nav-links">
      <a href="index.html">← Back to Home</a>
    </div>
  </nav>

  <div class="auth-container">
    <div class="auth-card" style="max-width:520px;">

      <!-- STEP 1: Registration Form -->
      <div id="step1">
        <h2>Create Account 🚀</h2>
        <p class="subtitle">Join RandomChat — meet new people today!</p>

        <div id="alertBox"></div>

        <div class="form-group">
          <label>Your Name</label>
          <input type="text" id="regName" placeholder="e.g. Rahul" maxlength="30"/>
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="regEmail" placeholder="your@email.com"/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="regPassword" placeholder="Min. 6 characters"/>
        </div>
        <div class="form-group">
          <label>Age</label>
          <input type="number" id="regAge" placeholder="e.g. 18" min="13" max="100"/>
        </div>
        <div class="form-group">
          <label>Gender</label>
          <select id="regGender">
            <option value="">Select gender</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
            <option value="other">Other</option>
          </select>
        </div>
        <div class="form-group">
          <label>Interests <span style="color:var(--text-muted);font-size:0.8rem;">(Select any)</span></label>
          <div class="interests-grid" id="interestsGrid"></div>
        </div>

        <button class="btn btn-primary" style="width:100%;margin-top:8px;" onclick="registerUser()">
          Create Account ✨
        </button>

        <div class="auth-footer">
          Already have an account? <a href="index.html">Login here</a>
        </div>
      </div>

      <!-- STEP 2: OTP Verification -->
      <div id="step2" style="display:none; text-align:center;">
        <div style="font-size:3rem;margin-bottom:12px;">📧</div>
        <h2>Enter OTP</h2>
        <p class="subtitle">We sent a 6-digit OTP to<br/><strong id="displayEmail" style="color:var(--accent);"></strong></p>

        <div id="otpAlertBox"></div>

        <div class="form-group" style="margin-top:20px;">
          <input type="text" id="otpInput" placeholder="Enter 6-digit OTP"
            maxlength="6" style="text-align:center;font-size:1.5rem;letter-spacing:8px;font-weight:bold;"/>
        </div>

        <button class="btn btn-primary" style="width:100%;" onclick="verifyOTP()">
          Verify OTP ✅
        </button>

        <div style="margin-top:16px;">
          <button class="btn btn-outline" style="width:100%;" onclick="resendOTP()">
            🔄 Resend OTP
          </button>
        </div>

        <div class="auth-footer" style="margin-top:16px;">
          <a href="register.html">← Start over</a>
        </div>
      </div>

    </div>
  </div>

  <script>
    // ---- Interest Tags ----
    const allInterests = [
      '🎵 Music', '🕺 Dancing', '💪 Fitness',
      '🎮 Gaming', '📸 Photography', '✈️ Travel',
      '🍕 Foodie', '📚 Reading', '🎨 Art',
      '🤼 Wrestling', '🥊 Boxing', '⚽ Football',
      '🏏 Cricket', '🎭 Acting', '🎬 Movies',
      '💻 Coding', '🎤 Singing', '🧘 Yoga',
      '🌿 Nature', '😂 Comedy'
    ];

    const grid = document.getElementById('interestsGrid');
    allInterests.forEach(interest => {
      const tag = document.createElement('div');
      tag.className = 'interest-tag';
      tag.textContent = interest;
      tag.onclick = () => tag.classList.toggle('selected');
      grid.appendChild(tag);
    });

    let currentEmail = '';

    // ---- REGISTER ----
    async function registerUser() {
      const name = document.getElementById('regName').value.trim();
      const email = document.getElementById('regEmail').value.trim();
      const password = document.getElementById('regPassword').value;
      const age = parseInt(document.getElementById('regAge').value);
      const gender = document.getElementById('regGender').value;
      const alertBox = document.getElementById('alertBox');
      const selectedTags = [...document.querySelectorAll('.interest-tag.selected')].map(t => t.textContent);

      if (!name || !email || !password || !age || !gender) {
        alertBox.innerHTML = '<div class="alert alert-error">Please fill all fields!</div>';
        return;
      }
      if (password.length < 6) {
        alertBox.innerHTML = '<div class="alert alert-error">Password must be at least 6 characters!</div>';
        return;
      }
      if (age < 13) {
        alertBox.innerHTML = '<div class="alert alert-error">You must be at least 13 years old!</div>';
        return;
      }

      alertBox.innerHTML = '<div class="alert alert-success">Sending OTP... ⏳</div>';

      try {
        const res = await fetch('/api/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password, age, gender, interests: selectedTags })
        });
        const data = await res.json();

        if (!res.ok) {
          alertBox.innerHTML = `<div class="alert alert-error">${data.msg}</div>`;
          return;
        }

        // Show OTP step
        currentEmail = email;
        document.getElementById('step1').style.display = 'none';
        document.getElementById('step2').style.display = 'block';
        document.getElementById('displayEmail').textContent = email;

      } catch (err) {
        alertBox.innerHTML = '<div class="alert alert-error">Server error. Try again!</div>';
      }
    }

    // ---- VERIFY OTP ----
    async function verifyOTP() {
      const otp = document.getElementById('otpInput').value.trim();
      const alertBox = document.getElementById('otpAlertBox');

      if (otp.length !== 6) {
        alertBox.innerHTML = '<div class="alert alert-error">Please enter 6-digit OTP!</div>';
        return;
      }

      alertBox.innerHTML = '<div class="alert alert-success">Verifying... ⏳</div>';

      try {
        const res = await fetch('/api/verify-otp', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: currentEmail, otp })
        });
        const data = await res.json();

        if (!res.ok) {
          alertBox.innerHTML = `<div class="alert alert-error">${data.msg}</div>`;
          return;
        }

        alertBox.innerHTML = '<div class="alert alert-success">✅ Verified! Redirecting to login...</div>';
        setTimeout(() => window.location.href = '/index.html?verified=true', 1500);

      } catch (err) {
        alertBox.innerHTML = '<div class="alert alert-error">Server error. Try again!</div>';
      }
    }

    // ---- RESEND OTP ----
    async function resendOTP() {
      const alertBox = document.getElementById('otpAlertBox');
      alertBox.innerHTML = '<div class="alert alert-success">Sending new OTP... ⏳</div>';

      try {
        const res = await fetch('/api/resend-otp', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email: currentEmail })
        });
        const data = await res.json();
        alertBox.innerHTML = `<div class="alert ${res.ok ? 'alert-success' : 'alert-error'}">${data.msg}</div>`;
      } catch (err) {
        alertBox.innerHTML = '<div class="alert alert-error">Error. Try again!</div>';
      }
    }

    // Enter key for OTP
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        if (document.getElementById('step2').style.display !== 'none') verifyOTP();
        else registerUser();
      }
    });
  </script>
</body>
</html>
